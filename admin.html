<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyBase 管理画面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }

.header { background: #fff; border-bottom: 1px solid #e5e5e7; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 17px; font-weight: 600; }
.header-badge { background: #0071e3; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }

.layout { display: flex; height: calc(100vh - 56px); }

/* サイドバー */
.sidebar { width: 240px; background: #fff; border-right: 1px solid #e5e5e7; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #e5e5e7; }
.sidebar-title { font-size: 12px; font-weight: 600; color: #6e6e73; letter-spacing: 0.05em; margin-bottom: 12px; }
.btn-new-thread { width: 100%; padding: 8px; border-radius: 8px; border: 1.5px dashed #c7c7cc; background: none; font-size: 13px; color: #0071e3; cursor: pointer; font-weight: 500; }
.btn-new-thread:hover { background: #f0f7ff; }

.thread-list { flex: 1; overflow-y: auto; padding: 8px; }
.thread-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
.thread-item:hover { background: #f5f5f7; }
.thread-item.active { background: #e8f0fe; }
.thread-dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; flex-shrink: 0; }
.thread-name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-del { font-size: 14px; color: #c7c7cc; cursor: pointer; opacity: 0; padding: 2px 4px; }
.thread-item:hover .thread-del { opacity: 1; }
.thread-del:hover { color: #ff3b30; }

/* メインエリア */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.main-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #6e6e73; font-size: 14px; }

.section { background: #fff; border-radius: 12px; border: 1px solid #e5e5e7; margin-bottom: 20px; overflow: hidden; }
.section-header { padding: 16px 20px; border-bottom: 1px solid #e5e5e7; display: flex; align-items: center; justify-content: space-between; }
.section-title { font-size: 14px; font-weight: 600; }

/* アップロードゾーン */
.upload-zone { margin: 20px; border: 2px dashed #c7c7cc; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover, .upload-zone.drag { border-color: #0071e3; background: #f0f7ff; }
.upload-zone.loading { opacity: 0.6; pointer-events: none; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: #6e6e73; }

/* 資料リスト */
.doc-list { padding: 0 20px 20px; }
.doc-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; border: 1px solid #e5e5e7; margin-top: 10px; }
.doc-icon { font-size: 24px; flex-shrink: 0; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta { font-size: 11px; color: #6e6e73; margin-top: 2px; }
.doc-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-sm { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #c7c7cc; background: #fff; font-weight: 500; }
.btn-sm:hover { background: #f5f5f7; }
.btn-sm.danger { color: #ff3b30; border-color: #ff3b30; }
.btn-sm.danger:hover { background: #fff0ee; }
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.badge.active { background: #e8fce8; color: #1a7f37; }
.badge.archived { background: #f5f5f7; color: #6e6e73; }

.notify { position: fixed; bottom: 24px; right: 24px; background: #1d1d1f; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.notify.show { opacity: 1; }

/* モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: #fff; border-radius: 16px; padding: 24px; width: 320px; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.modal input { width: 100%; border: 1px solid #c7c7cc; border-radius: 8px; padding: 9px 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
.modal input:focus { border-color: #0071e3; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-primary { padding: 8px 18px; border-radius: 8px; border: none; background: #0071e3; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: #0077ed; }
.btn-cancel { padding: 8px 18px; border-radius: 8px; border: 1px solid #c7c7cc; background: #fff; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>StudyBase</h1>
  <span class="header-badge">管理画面</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">スレッド</div>
      <button class="btn-new-thread" onclick="openNewThread()">＋ 新規スレッド</button>
    </div>
    <div class="thread-list" id="threadList"></div>
  </div>

  <div class="main" id="main">
    <div class="main-empty" id="mainEmpty">← スレッドを選択してください</div>
    <div id="mainContent" style="display:none">
      <div class="section">
        <div class="section-header">
          <span class="section-title">📄 資料をアップロード</span>
          <span style="font-size:12px;color:#6e6e73">PDF（テキスト埋め込み）対応</span>
        </div>
        <div class="upload-zone" id="uploadZone"
          onclick="triggerUpload()"
          ondragover="e=>e.preventDefault()"
          ondrop="handleDrop(event)">
          <div class="upload-icon">📂</div>
          <div class="upload-text" id="uploadText">クリックまたはドラッグ＆ドロップ</div>
          <div class="upload-sub" id="uploadSub">PDF・TXT・最大50MB</div>
        </div>
        <input type="file" id="fileInput" style="display:none" accept=".pdf,.txt" onchange="uploadFile(this)">
        <div class="doc-list" id="docList"></div>
      </div>
    </div>
  </div>
</div>

<div class="notify" id="notify"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>新規スレッド</h3>
    <input type="text" id="threadNameInput" placeholder="例：2027年度 ○○塾" onkeydown="if(event.key==='Enter')createThread()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="createThread()">作成</button>
    </div>
  </div>
</div>

<script>
const API = '';
let currentThread = null;

// ----------------------------------------
// 通知
// ----------------------------------------
function notify(msg, duration = 2500) {
  const el = document.getElementById('notify');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ----------------------------------------
// スレッド
// ----------------------------------------
async function loadThreads() {
  const res = await fetch(API + '/api/threads');
  const threads = await res.json();
  const list = document.getElementById('threadList');
  list.innerHTML = threads.map(t => `
    <div class="thread-item ${currentThread?.id === t.id ? 'active' : ''}" onclick="selectThread('${t.id}','${t.name.replace(/'/g,"\\'")}')">
      <div class="thread-dot"></div>
      <div class="thread-name">${t.name}</div>
      <span class="thread-del" onclick="event.stopPropagation();deleteThread('${t.id}')">✕</span>
    </div>
  `).join('');
}

function openNewThread() {
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('threadNameInput').focus(), 100);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('threadNameInput').value = '';
}

async function createThread() {
  const name = document.getElementById('threadNameInput').value.trim();
  if (!name) return;
  await fetch(API + '/api/threads', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
  closeModal();
  await loadThreads();
  notify('スレッドを作成しました');
}

async function deleteThread(id) {
  if (!confirm('このスレッドと関連資料をすべて削除しますか？')) return;
  await fetch(API + '/api/threads/' + id, { method: 'DELETE' });
  if (currentThread?.id === id) {
    currentThread = null;
    document.getElementById('mainEmpty').style.display = '';
    document.getElementById('mainContent').style.display = 'none';
  }
  await loadThreads();
  notify('削除しました');
}

function selectThread(id, name) {
  currentThread = { id, name };
  document.getElementById('mainEmpty').style.display = 'none';
  document.getElementById('mainContent').style.display = '';
  loadThreads();
  loadDocs();
}

// ----------------------------------------
// 資料
// ----------------------------------------
async function loadDocs() {
  if (!currentThread) return;
  const res = await fetch(API + '/api/docs?threadId=' + currentThread.id);
  const docs = await res.json();
  const list = document.getElementById('docList');
  if (docs.length === 0) { list.innerHTML = '<div style="color:#6e6e73;font-size:13px;padding-top:4px">資料がありません</div>'; return; }
  list.innerHTML = docs.map(d => `
    <div class="doc-item">
      <div class="doc-icon">${d.name.endsWith('.pdf') ? '📕' : '📄'}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.size}${d.pageCount ? ' · '+d.pageCount+'p' : ''}${d.hasImages ? ' · 🖼画像あり' : ''} · ${d.uploadedAt.slice(0,10)} · <span class="badge ${d.status === 'active' ? 'active' : 'archived'}">${d.status === 'active' ? '有効' : '旧版'}</span></div>
      </div>
      <div class="doc-actions">
        <button class="btn-sm" onclick="toggleStatus('${d.id}','${d.status}')">${d.status === 'active' ? 'アーカイブ' : '有効化'}</button>
        <button class="btn-sm danger" onclick="deleteDoc('${d.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

function triggerUpload() {
  if (!currentThread) { notify('⚠ 先にスレッドを選択してください'); return; }
  document.getElementById('fileInput').click();
}

function handleDrop(e) {
  e.preventDefault();
  if (!currentThread) { notify('⚠ 先にスレッドを選択してください'); return; }
  const file = e.dataTransfer.files[0];
  if (file) doUpload(file);
}

async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  await doUpload(file);
  input.value = '';
}

async function doUpload(file) {
  const isPdf = file.name.toLowerCase().endsWith('.pdf');
  const zone = document.getElementById('uploadZone');
  const text = document.getElementById('uploadText');
  const sub  = document.getElementById('uploadSub');

  zone.classList.add('loading');
  text.textContent = isPdf ? 'PDFを解析中（ページ画像生成含む）...' : 'アップロード中...';
  sub.textContent = isPdf ? 'ページ数によっては数十秒かかります' : '';

  const form = new FormData();
  form.append('file', file);
  form.append('threadId', currentThread.id);

  try {
    const res = await fetch(API + '/api/docs/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) {
      notify('エラー: ' + data.error, 4000);
    } else {
      const img = data.hasImages ? `・🖼${data.pageCount}ページ分の画像生成済` : '';
      notify(`アップロード完了: ${data.name}${img}`);
      await loadDocs();
    }
  } catch(e) {
    notify('エラー: ' + e.message, 4000);
  } finally {
    zone.classList.remove('loading');
    text.textContent = 'クリックまたはドラッグ＆ドロップ';
    sub.textContent = 'PDF・TXT・最大50MB';
  }
}

async function toggleStatus(id, status) {
  const next = status === 'active' ? 'archived' : 'active';
  await fetch(API + '/api/docs/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status: next }) });
  await loadDocs();
}

async function deleteDoc(id) {
  if (!confirm('この資料を削除しますか？')) return;
  await fetch(API + '/api/docs/' + id, { method: 'DELETE' });
  await loadDocs();
  notify('削除しました');
}

// ----------------------------------------
// 初期化
// ----------------------------------------
loadThreads();
</script>
</body>
</html>
